name: Eval Scan (audit + update)

# Autonomous daily curator. Claude Code finds NEW high-signal agent-eval content, vets it
# ruthlessly, verifies it, and opens ONE review PR — or none. Runs on a Claude subscription
# OAuth token. The bot can NEVER push to main or self-merge; a human approves every PR.
#
# This is the SIMPLE, PRODUCTIVE recipe (exhaustive single-job, capable subagents) — the one
# that actually surfaces real finds. The sophisticated delta-state/tiered recipe
# (.github/scan-recipe.md + .scanner/) is kept as documented future work (its real form is a
# two-job Haiku-scout -> Sonnet-vet pipeline); the single-job version of it was reliably safe
# but not productive in a 25-min CI budget.

on:
  schedule:
    - cron: "0 13 * * *"   # daily 13:00 UTC
  workflow_dispatch:
    inputs:
      focus:
        description: "Scope this run to one source group / topic (optional)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: awesome-evals-scan
  cancel-in-progress: false

jobs:
  scan:
    # This upstream workflow requires BenchFlow's Claude credentials/OIDC setup; forks keep it inert.
    if: github.repository_owner == 'benchflow-ai'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Slack notifications stay OFF (steps no-op) unless BOTH secrets are set:
      #   SLACK_BOT_TOKEN  — a Slack bot token (xoxb-…) with chat:write, invited to the channel
      #   SLACK_CHANNEL_ID — the target channel's ID (e.g. C07RE9B3LAW)
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Opens the Slack thread for this run and captures its timestamp so the result posts
      # as a threaded reply. Uses the Slack Web API directly (plain step, not the model).
      - name: Notify Slack — scan started
        id: slack_start
        if: env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL_ID != ''
        run: |
          txt=$(printf ':mag: *Daily eval scan started* — %s\nScanning known authors, company eng blogs, eval podcasts, arXiv & HF for new high-signal agent-eval content. Finds (and rejections) get threaded here. <%s|View run>' "$(date -u +%F)" "$RUN_URL")
          resp=$(curl -sS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H 'Content-type: application/json; charset=utf-8' \
            -d "$(jq -n --arg ch "$SLACK_CHANNEL_ID" --arg txt "$txt" '{channel:$ch, text:$txt}')")
          echo "ts=$(echo "$resp" | jq -r '.ts // empty')" >> "$GITHUB_OUTPUT"
          [ "$(echo "$resp" | jq -r .ok)" = "true" ] || echo "::warning::Slack start post failed: $(echo "$resp" | jq -r '.error // "unknown"')"

      - name: Run the eval scan
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Use the workflow token for git/PR ops instead of a minted Claude GitHub App token
          # (the OIDC->app-token exchange is an external dependency that can 401). The scanner
          # only needs to push a branch + open a PR, which GITHUB_TOKEN + permissions above cover.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          settings: ".github/claude-scan-settings.json"
          claude_args: "--model claude-sonnet-4-6 --max-turns 200"
          prompt: |
            You are the autonomous daily curator for **benchflow-ai/awesome-evals**. Find NEW, genuinely
            high-signal agent-evaluation content, vet it RUTHLESSLY, verify it, and open ONE review PR — or
            none. You can NEVER push to `main` and NEVER merge; a human approves every PR.
            Optional focus for this run: "${{ github.event.inputs.focus }}" (empty = full scan).

            1. Read `README.md`, `MENTIONS.md`, and `CONTRIBUTING.md`. Collect every URL AND entry title across
               BOTH lists as your dedup set. Dedup by URL **and** by close title — never re-add a paper/talk/post
               already listed under a different URL (arxiv vs html, or a podcast *about* a listed paper).

            2. DISCOVER thoroughly — spawn one Task subagent per seam IN PARALLEL and actually fetch each;
               concluding "nothing new" without fetching the company-blog indexes is a FAILED run:
               - known authors' latest (Eugene Yan, Han-Chung Lee, Hamel Husain, Shreya Shankar, Nathan Lambert,
                 Florian Brand, Jason Liu, Cameron Wolfe, Chip Huyen, Lilian Weng, Simon Willison);
               - company eng blogs — for JS-SPA ones (Cursor, Anthropic engineering, OpenAI, Cognition, Replit,
                 Sourcegraph, Braintrust, Vercel, Prime Intellect, BenchFlow) run **WebSearch recency queries**
                 (e.g. `site:cursor.com eval OR benchmark` past 2 weeks) AND fetch the index;
               - eval podcasts (Latent Space, Vanishing Gradients, AI That Works, MLOps Community, How I AI);
               - new benchmarks/tools (recent arXiv agent-eval, HF papers, GitHub releases via `gh api`);
               - eval mentions inside general agent-building posts/talks.

            3. VET RUTHLESSLY — real data/method/benchmark/war-story only. Most days 0-3 items, often ZERO;
               "no new items" is the normal successful outcome (open NO PR). Reject SEO/marketing/derivative/
               thin-recap and anything already in the dedup set. A single weak entry lowers trust in the list.
               PER-ITEM REVIEW: for EACH surviving candidate, spawn its OWN Task subagent that (a) judges it against
               the bar (keep/cut) and (b) assigns its target section (see step 5). Never batch-judge; one subagent
               per addition idea, so each gets a real review.

            4. VERIFY survivors. If the **/deep-research** skill is available, run ONE /deep-research pass over the
               survivor batch to adversarially fact-check each headline claim + surface dups/contradictions;
               otherwise spawn skeptic subagents that re-fetch the live page. NEVER state a number you cannot quote
               verbatim from one source sentence; drop anything you cannot verify.

            5. ROUTE each kept item into its CORRECT SECTION — integrate into the main list, NEVER a catch-all
               "Scan additions" subsection:
               - an eval-FOCUSED article/paper/tool → its best THEMED section in `README.md` BY TOPIC, inserted
                 among that section's existing entries: §1 why-evals · §2 eval⇄capability⇄RL-env · §3 model/harness/skill ·
                 §4 observability · §5 eval-infra · §6 benchmark-vs-eval & INTEGRITY (contamination, reward-hacking,
                 eval-awareness, leaderboard gaming) · §7 RL-environments · §8 LLM-as-judge & verifiers ·
                 §9 agent-specific eval & agent BENCHMARKS · §10 safety/adversarial.
               - a talk / podcast / lecture → the `🎙 Talks, podcasts & slides` section in `README.md`.
               - a resource that only MENTIONS evals (agent-building post/talk with a good eval segment, not eval-first)
                 → `MENTIONS.md`.
               Mirror the existing entry shape (`- **[Title](url)** — Author — note. 🆕`). NEVER create or use a
               generic "Scan additions" bucket, and NEVER put an eval-mention in `README.md`.

            6. If ≥1 item clears the bar: create branch `scan/<YYYY-MM-DD>`, commit (plain message, NO AI/Claude
               attribution or "Generated with" line), push, and open ONE PR (base=`main`) titled
               "Scan <date>: N new eval find(s)" whose body lists each addition, WHICH FILE it went to, the verbatim
               claim quote proving any stat, and why it clears the bar. NEVER push to `main`. If nothing clears the
               bar, make no changes and report "no new items".

            Be exhaustive in discovery, ruthless in inclusion — the list's value is curation, not volume.

      # Threads the outcome under the start message: the finds preview + a link to review/merge
      # the PR, or "no new items", or a failure note. Runs even if the scan step failed.
      - name: Notify Slack — scan result
        if: always() && env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL_ID != '' && steps.slack_start.outputs.ts != ''
        env:
          GH_TOKEN: ${{ github.token }}
          THREAD_TS: ${{ steps.slack_start.outputs.ts }}
          JOB_STATUS: ${{ job.status }}
        run: |
          # Latest open scan/* PR (robust to same-day branch naming).
          pr=$(gh pr list -R "$GITHUB_REPOSITORY" --base main --state open \
            --json number,title,url,body,headRefName \
            --jq '[.[] | select(.headRefName | startswith("scan/"))] | sort_by(.number) | last // empty' 2>/dev/null || true)
          if [ -n "$pr" ]; then
            num=$(echo "$pr" | jq -r .number); url=$(echo "$pr" | jq -r .url); title=$(echo "$pr" | jq -r .title)
            finds=$(echo "$pr" | jq -r '.body' | grep -E '^### ' | sed -E 's/^### /• /' | head -20)
            [ -z "$finds" ] && finds='(see the PR for the itemized finds)'
            txt=$(printf ':sparkles: *%s*\n%s\n\n<%s|Review & merge PR #%s> — _human approval required before anything lands_' "$title" "$finds" "$url" "$num")
          elif [ "$JOB_STATUS" = "success" ]; then
            txt=':white_check_mark: Scan finished — *no new items today* (nothing cleared the bar).'
          else
            txt=$(printf ':x: Scan run *%s* — no PR opened. <%s|Check the logs>' "$JOB_STATUS" "$RUN_URL")
          fi
          curl -sS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H 'Content-type: application/json; charset=utf-8' \
            -d "$(jq -n --arg ch "$SLACK_CHANNEL_ID" --arg ts "$THREAD_TS" --arg txt "$txt" '{channel:$ch, thread_ts:$ts, text:$txt}')" \
            | jq -e '.ok == true' >/dev/null || echo "::warning::Slack summary post failed"
